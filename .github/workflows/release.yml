name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build fat JAR
        run: ./gradlew shadowJar
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Compute SHA256
        id: sha256
        run: |
          JAR_FILE="build/libs/ADBMCPServer-${{ steps.version.outputs.VERSION }}-all.jar"
          SHA256=$(shasum -a 256 "$JAR_FILE" | awk '{print $1}')
          echo "SHA256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "JAR_FILE=$JAR_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sha256.outputs.JAR_FILE }}
          body: |
            ## ADBMCPServer ${{ steps.version.outputs.VERSION }}

            ### SHA256
            ```
            ${{ steps.sha256.outputs.SHA256 }}  ADBMCPServer-${{ steps.version.outputs.VERSION }}-all.jar
            ```
